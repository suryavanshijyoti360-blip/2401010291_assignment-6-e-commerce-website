<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav>
  <h2>🛒 PremiumStore</h2>
  <input id="search" placeholder="Search products..." onkeyup="filterProducts()">
</nav>

<!-- HERO SECTION -->
<section class="hero">
  <h1>Upgrade Your Lifestyle</h1>
  <p>Best quality products at affordable prices</p>
  <button onclick="scrollToProducts()">Shop Now</button>
</section>

<!-- CART -->
<div id="cart">
  <h3>Your Cart</h3>
  <div id="cartItems"></div>
  <p>Total: ₹<span id="total">0</span></p>
  <button class="checkout" onclick="checkout()">Checkout</button>
</div>

<!-- PRODUCTS -->
<section id="productsSection">
  <h2>Our Products</h2>
  <div class="container" id="products"></div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 Premium Store | Made by You 💖</p>
</footer>

<script src="script.js"></script>

</body>
</html>
